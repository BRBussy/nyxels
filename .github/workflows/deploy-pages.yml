# Deploy the UI (packages/ui) to GitHub Pages on every vX.X.X release tag.
#
# Pages serves the site under /<repo-name>/, so the build gets that as its
# Vite base path. The Pages source must be set to "GitHub Actions" in the
# repo settings (done once via `gh api repos/{owner}/{repo}/pages
# -f build_type=workflow`).
name: Deploy UI to GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  pages: write # to publish to Pages
  id-token: write # to verify the deployment source

# One deployment at a time; a newer tag supersedes an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The contract's compiled output (contract-sdk/managed/) is generated,
      # not committed, so every deploy compiles it fresh from source. The
      # compile script pins the toolchain (+0.31.0) and the CLI downloads it
      # on first use; the cache skips that download on later runs.
      - name: Cache Compact toolchain
        uses: actions/cache@v4
        with:
          path: ~/.compact
          key: compact-toolchain-0.31.0

      - name: Install Compact CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install workspace dependencies
        run: npm ci

      - name: Compile contract
        run: npm run compile

      - name: Build UI
        run: npm run build --workspace @nyxels/ui -- --base=/${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
